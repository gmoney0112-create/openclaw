<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenClaw Voice Operator</title>
  <style>
    body { font-family: sans-serif; padding: 24px; background: #f4f0e8; color: #1e2a2f; }
    button { padding: 12px 18px; margin-right: 12px; }
    pre { background: #fff; padding: 12px; border-radius: 8px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>OpenClaw Voice Operator</h1>
  <p>Connects to <code>/voice/stream</code> and shows incoming messages.</p>
  <button id="connect">Connect</button>
  <pre id="log">idle</pre>
  <script>
    const log = document.getElementById('log');
    document.getElementById('connect').addEventListener('click', () => {
      const socket = new WebSocket(`ws://${location.host}/voice/stream`);
      socket.onopen = () => {
        log.textContent = 'connected';
        socket.send(JSON.stringify({ type: 'audio', text: 'hey openclaw create a contact for Jane Smith' }));
      };
      socket.onmessage = (event) => {
        log.textContent += `\n${event.data}`;
      };
    });
  </script>
</body>
</html>
